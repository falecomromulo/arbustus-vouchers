<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbustus — Painel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style id="base-css"></style>
<style>
main{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--cinza-borda);margin-bottom:1.5rem}
.tab{padding:10px 20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--cinza-texto);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Montserrat',sans-serif}
.tab.active{color:var(--azul);border-bottom-color:var(--azul)}
.tab:hover:not(.active){color:#1a1a2e}
.tab-panel{display:none}.tab-panel.active{display:block}
.stats-hero{background:linear-gradient(135deg,#0d1f4a 0%,var(--verde-escuro) 100%);padding:2rem 1.5rem;position:relative;overflow:hidden}
.stats-hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.022) 0,rgba(255,255,255,.022) 1px,transparent 1px,transparent 48px)}
.sh-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;position:relative;z-index:1}
.sh-title{font-size:clamp(18px,3vw,26px);font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-1px}
.sh-title em{color:var(--teal);font-style:normal}
.sh-eyebrow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--teal);margin-bottom:5px}
.sh-pills{display:flex;gap:.75rem;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.6rem 1rem;text-align:center;min-width:70px}
.pill-n{font-size:26px;font-weight:900;color:#fff;line-height:1}
.pill-n.teal{color:var(--teal)}.pill-n.dourado{color:var(--dourado)}
.pill-l{font-size:9px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px}
.vd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:1rem;margin-bottom:1.5rem}
.vd-card{background:#fff;border:1px solid var(--cinza-borda);border-radius:14px;padding:1.25rem;position:relative;overflow:hidden;transition:box-shadow .2s}
.vd-card:hover{box-shadow:0 4px 20px rgba(11,46,115,.1)}
.vd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--verde)}
.vd-card.inativo::before{background:var(--cinza-borda)}
.vd-avatar{width:44px;height:44px;border-radius:12px;background:var(--azul);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;margin-bottom:.75rem}
.vd-card.inativo .vd-avatar{background:var(--cinza-borda);color:var(--cinza-texto)}
.vd-nome-txt{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.vd-pin-txt{font-size:11px;color:var(--cinza-texto);font-family:'Courier New',monospace;letter-spacing:1px}
.vd-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.vd-badge.ativo{background:#D4F4E2;color:var(--verde-escuro)}
.vd-badge.inativo{background:#F1EFE8;color:var(--cinza-texto)}
.vd-stats{display:flex;gap:1rem;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--cinza-borda)}
.vd-stat{text-align:center;flex:1}
.vd-stat-n{font-size:18px;font-weight:900;color:var(--azul)}
.vd-stat-l{font-size:9px;color:var(--cinza-texto);text-transform:uppercase;letter-spacing:.5px}
.vd-actions{display:flex;gap:6px;margin-top:.75rem}
.ac-btn{flex:1;padding:6px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border:1.5px solid;background:transparent;font-family:'Montserrat',sans-serif;transition:all .15s}
.ac-toggle{color:var(--verde-escuro);border-color:var(--verde)}.ac-toggle:hover{background:#E8F8F0}
.ac-toggle.bloquear{color:var(--perigo);border-color:var(--perigo)}.ac-toggle.bloquear:hover{background:#FDEDEC}
.ac-del2{color:var(--cinza-texto);border-color:var(--cinza-borda)}.ac-del2:hover{background:#FDEDEC;color:var(--perigo);border-color:var(--perigo)}
.form-novo{background:#fff;border:1px solid var(--cinza-borda);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
.form-novo-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--cinza-texto);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--cinza-borda)}
.form-row{display:grid;grid-template-columns:1fr 160px auto;gap:10px;align-items:end}
.table-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 2px 16px rgba(11,46,115,.04)}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--cinza-borda);min-width:520px}
thead tr{background:var(--azul)}
th{padding:11px 14px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.65);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--cinza-borda);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f7f9fc}
td{padding:12px 14px;font-size:13px;vertical-align:middle}
.td-code{font-family:'Courier New',monospace;font-weight:700;font-size:13px;color:var(--azul);letter-spacing:1px;white-space:nowrap}
.empty{background:#fff;border:1px solid var(--cinza-borda);border-radius:14px;padding:3rem 2rem;text-align:center}
.empty p{font-size:13px;color:var(--cinza-texto);margin-top:8px}
@media(max-width:640px){.sh-inner{flex-direction:column;align-items:flex-start}.sh-pills{width:100%}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap">
    <svg class="logo-symbol" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#0B2E73"/><circle cx="20" cy="20" r="16" fill="#2E8B57"/>
      <rect x="10" y="19" width="20" height="2" fill="rgba(255,255,255,0.55)" rx="1"/>
      <rect x="19" y="10" width="2" height="20" fill="rgba(255,255,255,0.55)" rx="1"/>
      <ellipse cx="20" cy="20" rx="6" ry="9" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="3" fill="#fff"/>
    </svg>
    <div><span class="logo-brand">Arbustus</span><span class="logo-sub">Gramados Sintéticos</span></div>
  </a>
  <a href="index.html" class="nav-btn">← Painel</a>
</header>

<div class="stats-hero">
  <div class="sh-inner">
    <div><div class="sh-eyebrow">Gestão admin</div><div class="sh-title">Painel <em>Admin</em></div></div>
    <div class="sh-pills">
      <div class="pill"><div class="pill-n" id="p-total">—</div><div class="pill-l">Vouchers</div></div>
      <div class="pill"><div class="pill-n teal" id="p-valid">—</div><div class="pill-l">Válidos</div></div>
      <div class="pill"><div class="pill-n dourado" id="p-vds">—</div><div class="pill-l">Vendedores</div></div>
    </div>
  </div>
</div>

<main>
  <div class="tabs">
    <button class="tab active" onclick="mudarTab('vendedores')">Vendedores</button>
    <button class="tab" onclick="mudarTab('vouchers')">Todos os vouchers</button>
  </div>

  <div class="tab-panel active" id="tab-vendedores">
    <div class="form-novo">
      <div class="form-novo-title">Cadastrar novo vendedor</div>
      <div id="alert-novo"></div>
      <div class="form-row">
        <div class="field" style="margin:0">
          <label>Nome do vendedor</label>
          <input type="text" id="novo-nome" placeholder="Ex.: Carlos Menezes" autocomplete="off">
        </div>
        <div class="field" style="margin:0">
          <label>PIN (4–6 dígitos)</label>
          <input type="text" id="novo-pin" placeholder="Ex.: 4821" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
        </div>
        <button class="btn btn-primary" style="width:auto;padding:11px 20px" onclick="cadastrarVendedor()">Cadastrar</button>
      </div>
    </div>
    <div id="vd-lista"></div>
  </div>

  <div class="tab-panel" id="tab-vouchers">
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.25rem">
      <div style="flex:1;min-width:180px;position:relative">
        <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.35" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="#6B7A99" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="#6B7A99" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="q-voucher" placeholder="Buscar código, cliente, vendedor…" style="width:100%;border:1.5px solid var(--cinza-borda);border-radius:8px;padding:10px 14px 10px 36px;font-size:13px;font-family:'Montserrat',sans-serif;outline:none" oninput="renderVouchers()">
      </div>
      <select id="q-vd" style="border:1.5px solid var(--cinza-borda);border-radius:8px;padding:10px 14px;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:600;outline:none;cursor:pointer;background:#fff;text-transform:uppercase;letter-spacing:.5px" onchange="renderVouchers()">
        <option value="">Todos os vendedores</option>
      </select>
      <select id="q-status" style="border:1.5px solid var(--cinza-borda);border-radius:8px;padding:10px 14px;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:600;outline:none;cursor:pointer;background:#fff;text-transform:uppercase;letter-spacing:.5px" onchange="renderVouchers()">
        <option value="">Todos</option>
        <option value="valid">Válidos</option>
        <option value="expired">Expirados</option>
      </select>
    </div>
    <div id="voucher-lista"></div>
  </div>
</main>

<footer>© Arbustus <em>Gramados Sintéticos</em> · Sistema de Vouchers</footer>

<script>
document.getElementById('base-css').textContent = CSS_BASE;
let todosVendedores=[],todosVouchers=[];

function mudarTab(tab){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['vendedores','vouchers'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach((el,i)=>el.classList.toggle('active',i===(['vendedores','vouchers'].indexOf(tab))));
}

async function carregar(){
  try{
    const [vds,vos]=await Promise.all([
      supa.select('vendedores','select=id,nome,pin,ativo,criado_em&order=criado_em.asc'),
      supa.select('vouchers','select=id,codigo,nome,descricao,expiry,criado_em,vendedor_id&order=criado_em.desc'),
    ]);
    todosVendedores=vds; todosVouchers=vos;
    renderPills(); renderVendedores(); renderVouchers(); popularFiltroVendedor();
  }catch(e){toast('Erro ao carregar dados.','erro');}
}

function renderPills(){
  document.getElementById('p-total').textContent=todosVouchers.length;
  document.getElementById('p-valid').textContent=todosVouchers.filter(v=>!isExpirado(v.expiry)).length;
  document.getElementById('p-vds').textContent=todosVendedores.filter(v=>v.ativo).length;
}

function renderVendedores(){
  const el=document.getElementById('vd-lista');
  if(!todosVendedores.length){el.innerHTML='<div class="empty"><p>Nenhum vendedor cadastrado ainda.</p></div>';return;}
  const cards=todosVendedores.map(vd=>{
    const emitidos=todosVouchers.filter(v=>v.vendedor_id===vd.id).length;
    const validos=todosVouchers.filter(v=>v.vendedor_id===vd.id&&!isExpirado(v.expiry)).length;
    const inicial=vd.nome.trim().charAt(0).toUpperCase();
    return `<div class="vd-card ${vd.ativo?'':'inativo'}">
      <div class="vd-avatar">${inicial}</div>
      <div class="vd-nome-txt">${vd.nome}</div>
      <div class="vd-pin-txt">PIN: ${'•'.repeat(vd.pin.length)}</div>
      <span class="vd-badge ${vd.ativo?'ativo':'inativo'}">${vd.ativo?'Ativo':'Bloqueado'}</span>
      <div class="vd-stats">
        <div class="vd-stat"><div class="vd-stat-n">${emitidos}</div><div class="vd-stat-l">Emitidos</div></div>
        <div class="vd-stat"><div class="vd-stat-n" style="color:var(--verde)">${validos}</div><div class="vd-stat-l">Válidos</div></div>
        <div class="vd-stat"><div class="vd-stat-n" style="color:var(--cinza-texto)">${emitidos-validos}</div><div class="vd-stat-l">Expirados</div></div>
      </div>
      <div class="vd-actions">
        <button class="ac-btn ac-toggle ${vd.ativo?'bloquear':''}" onclick="toggleAtivo('${vd.id}',${vd.ativo})">${vd.ativo?'Bloquear':'Ativar'}</button>
        <button class="ac-btn ac-del2" onclick="excluirVendedor('${vd.id}','${vd.nome}')">Excluir</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="vd-grid">${cards}</div>`;
}

async function cadastrarVendedor(){
  const nome=document.getElementById('novo-nome').value.trim();
  const pin=document.getElementById('novo-pin').value.trim();
  const alerta=document.getElementById('alert-novo');
  if(!nome){alerta.innerHTML='<div class="alert alert-error">Informe o nome do vendedor.</div>';return;}
  if(pin.length<4){alerta.innerHTML='<div class="alert alert-error">PIN deve ter no mínimo 4 dígitos.</div>';return;}
  if(todosVendedores.find(v=>v.pin===pin)){alerta.innerHTML='<div class="alert alert-error">Este PIN já está em uso.</div>';return;}
  alerta.innerHTML='';
  try{
    const [novo]=await supa.insert('vendedores',{nome,pin,ativo:true});
    todosVendedores.push(novo);
    document.getElementById('novo-nome').value='';
    document.getElementById('novo-pin').value='';
    renderVendedores();renderPills();popularFiltroVendedor();
    toast(`Vendedor ${nome} cadastrado — PIN: ${pin}`);
  }catch(e){alerta.innerHTML='<div class="alert alert-error">Erro ao cadastrar.</div>';}
}

async function toggleAtivo(id,ativoAtual){
  try{
    await supa.update('vendedores',`id=eq.${id}`,{ativo:!ativoAtual});
    const vd=todosVendedores.find(v=>v.id===id);
    if(vd)vd.ativo=!ativoAtual;
    renderVendedores();renderPills();
    toast(ativoAtual?'Vendedor bloqueado.':'Vendedor ativado.');
  }catch(e){toast('Erro ao atualizar.','erro');}
}

async function excluirVendedor(id,nome){
  if(!confirm(`Excluir o vendedor "${nome}"?\n\nOs vouchers emitidos por ele serão mantidos sem vínculo.`))return;
  try{
    await supa.delete('vendedores',`id=eq.${id}`);
    todosVendedores=todosVendedores.filter(v=>v.id!==id);
    renderVendedores();renderPills();popularFiltroVendedor();
    toast('Vendedor excluído.');
  }catch(e){toast('Erro ao excluir.','erro');}
}

function popularFiltroVendedor(){
  const sel=document.getElementById('q-vd');
  const val=sel.value;
  sel.innerHTML='<option value="">Todos os vendedores</option>'+todosVendedores.map(v=>`<option value="${v.id}">${v.nome}</option>`).join('');
  sel.value=val;
}

function renderVouchers(){
  const q=(document.getElementById('q-voucher').value||'').toLowerCase();
  const vdId=document.getElementById('q-vd').value;
  const status=document.getElementById('q-status').value;
  const lista=todosVouchers.filter(v=>{
    const vd=todosVendedores.find(x=>x.id===v.vendedor_id);
    const textOk=(v.codigo+v.nome+v.descricao+(vd?vd.nome:'')).toLowerCase().includes(q);
    const vdOk=!vdId||v.vendedor_id===vdId;
    const exp=isExpirado(v.expiry);
    const stOk=!status||(status==='valid'&&!exp)||(status==='expired'&&exp);
    return textOk&&vdOk&&stOk;
  });
  const el=document.getElementById('voucher-lista');
  if(!lista.length){el.innerHTML='<div class="empty"><p>Nenhum voucher encontrado.</p></div>';return;}
  const rows=lista.map(v=>{
    const vd=todosVendedores.find(x=>x.id===v.vendedor_id);
    const exp=isExpirado(v.expiry);
    const dExp=new Date(v.expiry).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
    const dCri=new Date(v.criado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
    return `<tr>
      <td class="td-code">${v.codigo}</td>
      <td><strong style="display:block;font-weight:700">${v.nome}</strong><span style="font-size:11px;color:var(--cinza-texto)">${v.descricao}</span></td>
      <td style="font-size:12px">${vd?`<strong>${vd.nome}</strong>`:'-'}</td>
      <td><span class="badge badge-${exp?'expired':'valid'}">${exp?'Expirado':'Válido'}</span></td>
      <td style="font-size:12px;white-space:nowrap"><strong>${dExp}</strong><span style="display:block;color:var(--cinza-texto)">emitido ${dCri}</span></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Código</th><th>Cliente / Serviço</th><th>Vendedor</th><th>Status</th><th>Validade</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

carregar();
</script>
</body>
</html>
