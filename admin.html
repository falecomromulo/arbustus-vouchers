<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbustus — Emitir Voucher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="supabase.js"></script>
<script src="auth.js"></script>
<style id="base-css"></style>
<style>
  /* VOUCHER RESULTADO */
  .voucher-result { display: none; margin-top: 1.25rem; border: 2px solid var(--verde); border-radius: 16px; overflow: hidden; }
  .voucher-result.show { display: block; animation: fadeSlide .35s ease; }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .vr-header { background: var(--verde-escuro); padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
  .vr-htxt span { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--teal); display: block; }
  .vr-htxt strong { font-size: 16px; color: #fff; display: block; font-weight: 700; }

  .vr-body { padding: 1.5rem; background: #f6fef9; }

  .vr-code {
    font-size: 30px; font-weight: 900; font-family: 'Courier New', monospace;
    color: var(--azul); letter-spacing: 4px;
    background: #EDF3FF; border: 1.5px dashed var(--azul);
    border-radius: 10px; padding: 14px; text-align: center;
    cursor: pointer; transition: background .2s; margin-bottom: 1rem;
    position: relative;
  }
  .vr-code:hover { background: #dce8ff; }
  .vr-code-hint { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--cinza-texto); font-family: 'Montserrat',sans-serif; display: block; margin-top: 5px; }

  .vr-meta { font-size: 13px; color: #3a4a5c; line-height: 1.7; }
  .vr-meta strong { color: var(--azul); }

  .vr-actions { display: flex; gap: 8px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #c3e6d0; }
  .btn-outline { flex: 1; padding: 10px; border-radius: 8px; font-family: 'Montserrat',sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; cursor: pointer; border: 1.5px solid; background: transparent; transition: all .15s; }
  .btn-wpp  { color: #0f6c52; border-color: #0f6c52; }
  .btn-wpp:hover  { background: #e8f8f3; }
  .btn-link-cp { color: var(--azul); border-color: var(--azul); }
  .btn-link-cp:hover { background: #EDF3FF; }
  .btn-nova { color: var(--cinza-texto); border-color: var(--cinza-borda); }
  .btn-nova:hover { background: var(--cinza-claro); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo-wrap">
    <svg class="logo-symbol" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#0B2E73"/>
      <circle cx="20" cy="20" r="16" fill="#2E8B57"/>
      <rect x="10" y="19" width="20" height="2" fill="rgba(255,255,255,0.55)" rx="1"/>
      <rect x="19" y="10" width="2" height="20" fill="rgba(255,255,255,0.55)" rx="1"/>
      <ellipse cx="20" cy="20" rx="6" ry="9" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="3" fill="#fff"/>
    </svg>
    <div>
      <span class="logo-brand">Arbustus</span>
      <span class="logo-sub">Gramados Sintéticos</span>
    </div>
  </a>
  <a href="index.html" class="nav-btn">← Painel</a>
</header>

<div class="hero-strip">
  <div class="hero-eyebrow">Gestão comercial</div>
  <h1 class="hero-h1">Emitir <em>Voucher</em></h1>
</div>

<main>
  <div class="card">
    <div class="card-title">Dados do voucher</div>
    <div id="alert-box"></div>

    <div class="field">
      <label>Nome do cliente</label>
      <input type="text" id="v-nome" placeholder="Ex.: João Silva" autocomplete="off">
    </div>
    <div class="field">
      <label>Serviço / Produto</label>
      <input type="text" id="v-desc" placeholder="Ex.: Instalação campo society 50m²">
    </div>
    <div class="row-2">
      <div class="field">
        <label>Validade</label>
        <input type="number" id="v-qtd" value="30" min="1" max="3650">
      </div>
      <div class="field">
        <label>Unidade</label>
        <select id="v-unit">
          <option value="d">Dias</option>
          <option value="h">Horas</option>
          <option value="m">Minutos</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Observação (opcional)</label>
      <textarea id="v-obs" placeholder="Ex.: Válido somente para campo 7x7. Não acumulável."></textarea>
    </div>

    <button class="btn btn-primary" id="btn-emitir" onclick="emitir()">Gerar voucher</button>

    <div class="voucher-result" id="voucher-result">
      <div class="vr-header">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="14" fill="rgba(255,255,255,0.1)"/>
          <path d="M9 14l3.5 3.5L19 10" stroke="#10B6AC" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="vr-htxt">
          <span>Voucher emitido com sucesso</span>
          <strong id="vr-nome">—</strong>
        </div>
      </div>
      <div class="vr-body">
        <div class="vr-code" id="vr-code" onclick="copiarCodigo()">
          <span id="vr-code-txt">—</span>
          <span class="vr-code-hint">Clique para copiar</span>
        </div>
        <div class="vr-meta" id="vr-meta"></div>
        <div class="vr-actions">
          <button class="btn-outline btn-wpp"     onclick="compartilharWpp()">WhatsApp</button>
          <button class="btn-outline btn-link-cp" onclick="copiarLink()">Copiar link</button>
          <button class="btn-outline btn-nova"    onclick="novoVoucher()">Novo</button>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>© Arbustus <em>Gramados Sintéticos</em> · Sistema de Vouchers</footer>

<script>
document.getElementById('base-css').textContent = CSS_BASE;

let ultimoVoucher = null;

async function emitir() {
  const nome  = document.getElementById('v-nome').value.trim();
  const desc  = document.getElementById('v-desc').value.trim();
  const qtd   = parseInt(document.getElementById('v-qtd').value) || 1;
  const unit  = document.getElementById('v-unit').value;
  const obs   = document.getElementById('v-obs').value.trim();
  const alerta = document.getElementById('alert-box');
  const btn   = document.getElementById('btn-emitir');

  if (!nome) { alerta.innerHTML = '<div class="alert alert-error">Informe o nome do cliente.</div>'; return; }
  if (!desc) { alerta.innerHTML = '<div class="alert alert-error">Informe o serviço ou produto.</div>'; return; }
  alerta.innerHTML = '';

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Gerando…';

  try {
    // Buscar códigos existentes para garantir unicidade
    const existentes = await supa.select('vouchers', 'select=codigo');
    const codigo = genCodigo(existentes);
    const expiry = expiryFromQtd(qtd, unit);

    const [inserido] = await supa.insert('vouchers', {
      codigo,
      nome,
      descricao: desc,
      observacao: obs || null,
      expiry,
    });

    ultimoVoucher = inserido;

    const unitLabel = unit === 'd' ? (qtd === 1 ? 'dia' : 'dias')
                    : unit === 'h' ? (qtd === 1 ? 'hora' : 'horas')
                    : (qtd === 1 ? 'minuto' : 'minutos');
    const dataExp = new Date(expiry).toLocaleDateString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });

    document.getElementById('vr-nome').textContent      = nome;
    document.getElementById('vr-code-txt').textContent  = codigo;
    document.getElementById('vr-meta').innerHTML =
      `<strong>Serviço:</strong> ${desc}<br>` +
      `<strong>Validade:</strong> ${qtd} ${unitLabel} — expira em ${dataExp}` +
      (obs ? `<br><strong>Obs:</strong> ${obs}` : '');

    document.getElementById('voucher-result').classList.add('show');
    document.getElementById('voucher-result').scrollIntoView({ behavior: 'smooth', block: 'center' });

    document.getElementById('v-nome').value = '';
    document.getElementById('v-desc').value = '';
    document.getElementById('v-obs').value  = '';

  } catch(e) {
    console.error(e);
    alerta.innerHTML = '<div class="alert alert-error">Erro ao salvar no banco. Verifique a conexão com o Supabase.</div>';
  }

  btn.disabled = false;
  btn.textContent = 'Gerar voucher';
}

function getLink() {
  if (!ultimoVoucher) return '';
  return `${location.origin}/consultar.html?codigo=${encodeURIComponent(ultimoVoucher.codigo)}`;
}

function copiarCodigo() {
  if (!ultimoVoucher) return;
  navigator.clipboard.writeText(ultimoVoucher.codigo)
    .then(() => toast('Código copiado!'))
    .catch(() => {});
}

function copiarLink() {
  navigator.clipboard.writeText(getLink())
    .then(() => toast('Link copiado!'))
    .catch(() => {});
}

function compartilharWpp() {
  if (!ultimoVoucher) return;
  const msg =
    `*Voucher Arbustus Gramados Sintéticos*\n\n` +
    `Olá, ${ultimoVoucher.nome}! Segue seu voucher:\n\n` +
    `Código: *${ultimoVoucher.codigo}*\n` +
    `Serviço: ${ultimoVoucher.descricao}\n\n` +
    `Consulte a validade pelo link:\n${getLink()}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function novoVoucher() {
  ultimoVoucher = null;
  document.getElementById('voucher-result').classList.remove('show');
  document.getElementById('v-nome').focus();
}
</script>
</body>
</html>
